<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Background: pixel art cooking pot / chef hat -->
  <!-- Row 0-3: Chef hat (white) -->
  <rect x="10" y="0" width="12" height="2" fill="#FFFFFF"/>
  <rect x="8" y="2" width="16" height="2" fill="#FFFFFF"/>
  <rect x="6" y="4" width="20" height="2" fill="#FFFFFF"/>
  <rect x="6" y="6" width="20" height="2" fill="#FFFFFF"/>
  <rect x="8" y="8" width="16" height="2" fill="#FFFFFF"/>
  <rect x="10" y="10" width="12" height="2" fill="#FFFFFF"/>

  <!-- Face (warm skin tone) -->
  <rect x="12" y="12" width="8" height="4" fill="#FFCC99"/>

  <!-- Eyes -->
  <rect x="14" y="13" width="2" height="2" fill="#5D4037"/>
  <rect x="18" y="13" width="2" height="2" fill="#5D4037"/>

  <!-- Mouth (smile) -->
  <rect x="14" y="16" width="2" height="1" fill="#5D4037"/>
  <rect x="16" y="17" width="2" height="1" fill="#5D4037"/>
  <rect x="18" y="16" width="2" height="1" fill="#5D4037"/>

  <!-- Body / Apron -->
  <rect x="11" y="20" width="10" height="2" fill="#FF6B35"/>
  <rect x="10" y="22" width="12" height="2" fill="#FF6B35"/>
  <rect x="10" y="24" width="12" height="2" fill="#FF6B35"/>
  <rect x="11" y="26" width="10" height="2" fill="#FF6B35"/>

  <!-- Cooking pot in hand -->
  <rect x="18" y="24" width="8" height="2" fill="#8D6E63"/>
  <rect x="18" y="26" width="8" height="4" fill="#5D4037"/>
  <rect x="16" y="22" width="4" height="2" fill="#8D6E63"/>
  <!-- Steam -->
  <rect x="20" y="18" width="2" height="2" fill="#CCC"/>
  <rect x="24" y="16" width="2" height="2" fill="#CCC"/>
  <rect x="22" y="20" width="2" height="2" fill="#CCC"/>

  <!-- Pixel border -->
  <rect x="0" y="0" width="32" height="1" fill="#FF6B35"/>
  <rect x="0" y="31" width="32" height="1" fill="#FF6B35"/>
  <rect x="0" y="0" width="1" height="32" fill="#FF6B35"/>
  <rect x="31" y="0" width="1" height="32" fill="#FF6B35"/>
</svg>
